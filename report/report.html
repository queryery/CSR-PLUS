<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSR+ Report</title>
  <link rel="stylesheet" href="report.css" />
</head>
<body>
  <div class="fx-grid" aria-hidden="true"></div>
  <div class="fx-scan" aria-hidden="true"></div>

  <header class="topbar">
    <div class="tb-left">
      <button class="back-btn" id="back-btn" title="Go back">← Back</button>
      <div class="brand">
        <img src="../assets/icon256.png" width="24" height="24" alt="" />
        <span class="brand-name">CSR<span>+</span></span>
        <span class="brand-sep">/</span>
        <span class="brand-mod">REPORT</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h1 class="title">Report a player</h1>
      <p class="sub" id="target-line">Target: <code id="target-id">—</code></p>

      <div class="auth" id="auth-block">
        <p class="dim">Sign in with Discord to submit a report.</p>
        <button class="btn primary" id="signin-btn">Sign in with Discord</button>
      </div>

      <form class="form" id="report-form" hidden>
        <label class="fld">
          <span>Reason</span>
          <select id="reason" required>
            <option value="">Select a reason…</option>
            <option>Cheating</option>
            <option>Toxic/Harassment</option>
            <option>Griefing/Trolling</option>
            <option>Offensive name/avatar</option>
            <option>Ban evasion</option>
            <option>Other</option>
          </select>
        </label>

        <label class="fld">
          <span>Details <em id="desc-count">(0/500)</em></span>
          <textarea id="description" maxlength="500" rows="4"
            placeholder="What happened? Include round/time if useful."></textarea>
        </label>

        <label class="fld">
          <span>Screenshot <em>(optional, image)</em></span>
          <input type="file" id="shot" accept="image/png,image/jpeg,image/webp" />
        </label>

        <label class="fld">
          <span>Video <em>(optional, ≤ 50 MB, mp4/webm)</em></span>
          <input type="file" id="video" accept="video/mp4,video/webm" />
        </label>

        <div class="msg" id="msg"></div>

        <div class="actions">
          <button class="btn primary" id="submit-btn" type="submit">Submit report</button>
        </div>
        <p class="dim tiny">Reports go to CSR+ moderators. False or spam reports may be rate-limited.
          You can report a given player once per day, and up to 3 reports per hour.</p>
      </form>
    </section>
  </main>

  <script src="../src/lib/confirm.js"></script>
  <script src="report.js"></script>
</body>
</html>
