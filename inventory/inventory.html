<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSR+ Inventory</title>
  <link rel="stylesheet" href="inventory.css" />
</head>
<body>
  <div class="fx-grid" aria-hidden="true"></div>
  <div class="fx-scan" aria-hidden="true"></div>

  <header class="topbar">
    <div class="tb-left">
      <button class="back-btn" id="back-btn" title="Go back">← Back</button>
      <div class="brand">
        <img src="../assets/icon256.png" width="24" height="24" alt="" />
        <span class="brand-name">CSR<span>+</span></span>
        <span class="brand-sep">/</span>
        <span class="brand-mod">INVENTORY</span>
      </div>
    </div>
    <a class="site-link" id="site-link" target="_blank" rel="noopener">Open on csrestored.fun ↗</a>
  </header>

  <main id="app">
    <section class="inv-head" id="head">
      <div class="ih-skel">Loading inventory…</div>
    </section>

    <section class="toolbar" id="toolbar" hidden>
      <div class="tb-stats" id="tb-stats"></div>
      <div class="tb-controls">
        <input type="search" id="search" class="tb-search" placeholder="Search items…" />
        <div class="seg" id="sort">
          <button data-v="rarity" class="on">Rarity</button>
          <button data-v="float">Float</button>
          <button data-v="name">Name</button>
        </div>
      </div>
      <div class="tb-filters" id="filters"></div>
    </section>

    <section class="grid" id="grid"></section>
  </main>

  <footer class="foot">CSR+ · not affiliated with Valve or Counter-Strike: Restored</footer>

  <script src="inventory.js"></script>
</body>
</html>
